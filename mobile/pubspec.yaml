name: hidrometro_brk
description: App de leitura de hidrômetro para fiscais da Prolar AGE.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP e autenticação
  http: ^1.2.0
  jwt_decoder: ^2.0.1
  # Câmera e imagens
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7
  # Armazenamento local (offline)
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  # Estado e navegação
  provider: ^6.1.2
  go_router: ^13.2.0
  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
